name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read

jobs:
  deploy-dev:
    name: deploy to dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.7.0"
      - name: Init
        run: terraform -chdir=environments/dev init
      - name: Apply
        env:
          TF_VAR_db_url: ${{ secrets.DB_URL }}
        run: terraform -chdir=environments/dev apply -auto-approve

  deploy-test:
    name: deploy to test
    runs-on: ubuntu-latest
    environment: test
    needs: deploy-dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.7.0"
      - name: Init
        run: terraform -chdir=environments/prod init
      - name: Apply
        env:
          TF_VAR_db_url: ${{ secrets.DB_URL }}
        run: terraform -chdir=environments/prod apply -auto-approve

  deploy-prod:
    name: deploy to prod
    runs-on: ubuntu-latest
    environment: prod
    needs: deploy-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.7.0"
      - name: Init
        run: terraform -chdir=environments/prod init
      - name: Apply
        env:
          TF_VAR_db_url: ${{ secrets.DB_URL }}
        run: terraform -chdir=environments/prod apply -auto-approve
