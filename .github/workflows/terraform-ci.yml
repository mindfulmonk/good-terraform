name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
      - name: Check formatting
        run: terraform fmt -check -recursive

  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
      - name: Init (no backend)
        run: terraform -chdir=environments/dev init -backend=false
      - name: Validate
        run: terraform -chdir=environments/dev validate

  security:
    name: tfsec
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    needs: [validate, security]
    environment: dev
    if: ${{ secrets.WIF_PROVIDER != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform init
        run: terraform -chdir=environments/dev init

      - name: Terraform plan
        id: plan
        run: terraform -chdir=environments/dev plan -no-color 2>&1 | tee plan.txt

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const body = plan.length > 60000 ? plan.slice(-60000) : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${body}\n\`\`\``
            });
