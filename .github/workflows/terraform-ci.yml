name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.7.0"
      - name: Check formatting
        run: terraform fmt -check -recursive

  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      matrix:
        environment: [dev, prod]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.7.0"
      - name: Init (no backend)
        run: terraform -chdir=environments/${{ matrix.environment }} init -backend=false
      - name: Validate
        run: terraform -chdir=environments/${{ matrix.environment }} validate

  security:
    name: checkov
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Checkov
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          directory: .
          framework: terraform
          output_format: cli
          soft_fail: false

  check-secrets:
    name: check wif secrets
    runs-on: ubuntu-latest
    outputs:
      has_wif: ${{ steps.check.outputs.has_wif }}
    steps:
      - id: check
        env:
          WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
        run: |
          if [ -n "$WIF_PROVIDER" ]; then
            echo "has_wif=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_wif=false" >> "$GITHUB_OUTPUT"
          fi

  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    needs: [validate, security, check-secrets]
    environment: dev
    if: needs.check-secrets.outputs.has_wif == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform init
        run: terraform -chdir=environments/dev init

      - name: Terraform plan
        id: plan
        run: terraform -chdir=environments/dev plan -no-color 2>&1 | tee plan.txt

      - name: Post plan to PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const body = plan.length > 60000 ? plan.slice(-60000) : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${body}\n\`\`\``
            });
