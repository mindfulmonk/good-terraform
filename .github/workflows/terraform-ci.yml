name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.7.0"
      - name: Check formatting
        run: terraform fmt -check -recursive

  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      matrix:
        environment: [dev, prod]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.7.0"
      - name: Init
        run: terraform -chdir=environments/${{ matrix.environment }} init -backend=false
      - name: Validate
        run: terraform -chdir=environments/${{ matrix.environment }} validate

  security:
    name: checkov
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Checkov
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          directory: .
          framework: terraform
          output_format: cli
          soft_fail: false

  check-secrets:
    name: check secrets
    runs-on: ubuntu-latest
    outputs:
      has_db_url: ${{ steps.check.outputs.has_db_url }}
    steps:
      - id: check
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          if [ -n "$DB_URL" ]; then
            echo "has_db_url=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_db_url=false" >> "$GITHUB_OUTPUT"
          fi

  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    needs: [validate, security, check-secrets]
    if: needs.check-secrets.outputs.has_db_url == 'true'
    strategy:
      matrix:
        environment: [dev, prod]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.7.0"
      - name: Init
        run: terraform -chdir=environments/${{ matrix.environment }} init
      - name: Plan
        id: plan
        env:
          TF_VAR_db_url: ${{ secrets.DB_URL }}
        run: |
          terraform -chdir=environments/${{ matrix.environment }} plan -no-color 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Post plan to PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const body = plan.length > 60000 ? plan.slice(-60000) : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ matrix.environment }}\`\n\`\`\`\n${body}\n\`\`\``
            });
